<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conectando con Meta...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #09090b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 20px;
      padding: 36px 28px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }
    .spinner-wrap { margin: 0 auto 18px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .icon-wrap {
      width: 56px; height: 56px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.25);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
    }
    .icon-err {
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.25);
    }
    h2 { color: #fff; font-size: 18px; font-weight: 800; line-height: 1.3; }
    p { color: #71717a; font-size: 13px; margin-top: 10px; line-height: 1.6; }
    .close-btn {
      margin-top: 22px;
      padding: 10px 24px;
      background: #27272a;
      border: 1px solid #3f3f46;
      color: #a1a1aa;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-block;
    }
    .close-btn:hover { background: #3f3f46; color: #fff; }
  </style>
</head>
<body>

  <!-- Loading state (shown while processing) -->
  <div class="card" id="state-loading">
    <div class="spinner-wrap"><div class="spinner"></div></div>
    <h2>Procesando...</h2>
    <p>Completando la conexión con Meta. Esto solo toma un momento.</p>
  </div>

  <!-- Success state (shown if popup can't close) -->
  <div class="card" id="state-success" style="display:none;">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" width="28" height="28"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h2>¡Conexión Exitosa!</h2>
    <p>Tu cuenta de Meta fue vinculada correctamente. Podés cerrar esta pestaña y volver a la app.</p>
    <button class="close-btn" onclick="window.close()">Cerrar ventana</button>
  </div>

  <!-- Error state -->
  <div class="card" id="state-error" style="display:none;">
    <div class="icon-wrap icon-err">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" width="28" height="28"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <h2>Error al conectar</h2>
    <p id="error-msg">Ocurrió un error al vincular la cuenta de Meta. Por favor intentá nuevamente.</p>
    <button class="close-btn" onclick="window.close()">Cerrar ventana</button>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var metaStatus = params.get('meta');
    var clientId   = params.get('clientId') || '';
    var reason     = params.get('reason') || 'unknown';

    function show(id) {
      ['state-loading','state-success','state-error'].forEach(function(s){
        document.getElementById(s).style.display = s === id ? 'block' : 'none';
      });
    }

    function broadcast(payload) {
      // 1. postMessage to opener window (popup case)
      try {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(payload, window.location.origin);
        }
      } catch(e) {}

      // 2. BroadcastChannel (same-origin tabs)
      try {
        var bc = new BroadcastChannel('meta_oauth');
        bc.postMessage(payload);
        setTimeout(function(){ try{ bc.close(); }catch(e){} }, 1000);
      } catch(e) {}

      // 3. localStorage storage event (cross-tab fallback)
      try {
        if (payload.type === 'meta-select') {
          localStorage.setItem('meta_oauth_complete', JSON.stringify({ clientId: payload.clientId, ts: Date.now() }));
        }
      } catch(e) {}
    }

    if (metaStatus === 'select' && clientId) {
      // Broadcast success to main window
      broadcast({ type: 'meta-select', clientId: clientId });

      // Try to close this popup
      window.close();

      // If we're still alive after 600ms → popup was blocked → we ARE the main window
      // Redirect to the app's integraciones page using correct hash URL
      setTimeout(function() {
        show('state-loading');
        window.location.replace(
          window.location.origin + '/?meta=select&clientId=' + encodeURIComponent(clientId) + '#/integraciones'
        );
      }, 600);

      // Show success UI after 400ms in case popup can't close immediately
      setTimeout(function() { show('state-success'); }, 400);

    } else if (metaStatus === 'error') {
      // Show error briefly, then close or redirect
      show('state-error');
      var msg = reason === 'user_denied'
        ? 'Cancelaste el permiso en Facebook.'
        : ('Error: ' + reason.replace(/_/g,' '));
      document.getElementById('error-msg').textContent = msg;

      broadcast({ type: 'meta-error', reason: reason });
      window.close();

      // If still alive → redirect to app with error
      setTimeout(function() {
        window.location.replace(
          window.location.origin + '/?meta=error&reason=' + encodeURIComponent(reason) + '#/integraciones'
        );
      }, 2000);
    }
  </script>
</body>
</html>
