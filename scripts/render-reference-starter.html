<!doctype html>
<html lang="es">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Creattia Reference Renderer</title>
	<style>
		*{box-sizing:border-box}html,body{margin:0;background:#101014;font-family:Inter,Arial,Helvetica,sans-serif}.card{width:1080px;height:1350px;position:relative;overflow:hidden;padding:72px;color:#101014;background:var(--bg);isolation:isolate}.card::before,.card::after{content:"";position:absolute;border-radius:999px;filter:blur(2px);z-index:-1}.card::before{width:560px;height:560px;right:-190px;top:-210px;background:var(--glow);opacity:.72}.card::after{width:420px;height:420px;left:-170px;bottom:-180px;background:#fff;opacity:.5}.card[data-variant="2"]{--bg:#f0f7ff;--ink:#0a1c32;--accent:#1687ff;--soft:#dcecff;--glow:#a8d7ff}.card[data-variant="3"]{--bg:#fff3e7;--ink:#2b1609;--accent:#ff5f28;--soft:#ffe0cf;--glow:#ffc7a9}.card[data-variant="4"]{--bg:#effcf1;--ink:#102218;--accent:#16a764;--soft:#d4f5dd;--glow:#a9ebbe}.card[data-variant="5"]{--bg:#fff0f5;--ink:#2c0d1a;--accent:#e9397a;--soft:#ffd5e4;--glow:#ffb2cf}.card[data-variant="1"]{--bg:#f4efff;--ink:#1b1034;--accent:#7338ed;--soft:#e7dcff;--glow:#cfb5ff}.card{color:var(--ink)}.top{display:flex;justify-content:space-between;align-items:center;font-weight:900;letter-spacing:.12em;font-size:22px}.brand{display:flex;gap:14px;align-items:center}.mark{width:38px;height:38px;border-radius:12px;background:var(--ink);position:relative}.mark::after{content:"✦";position:absolute;inset:0;color:#fff;display:grid;place-items:center;font-size:18px}.idea{border:2px solid color-mix(in srgb,var(--ink) 18%,transparent);border-radius:999px;padding:12px 20px;background:#ffffffa8}.copy{position:relative;z-index:2;margin-top:72px;max-width:900px}.eyebrow{display:inline-flex;background:var(--ink);color:#fff;border-radius:999px;padding:12px 20px;font-weight:900;font-size:20px;letter-spacing:.08em;text-transform:uppercase}.copy h1{font-size:78px;line-height:.94;letter-spacing:-.055em;margin:28px 0 18px;max-width:950px}.copy p{font-size:27px;line-height:1.25;margin:0;font-weight:650;max-width:730px;color:color-mix(in srgb,var(--ink) 70%,transparent)}.stage{position:absolute;left:72px;right:72px;top:505px;height:620px;border-radius:48px;background:#ffffffb8;border:2px solid #ffffff;box-shadow:0 40px 90px #24133e20;overflow:hidden;padding:42px}.proof{position:absolute;left:72px;right:72px;bottom:58px;display:flex;align-items:center;justify-content:space-between}.proof strong{font-size:24px}.proof span{font-size:20px;font-weight:800;color:color-mix(in srgb,var(--ink) 56%,transparent)}.cta{background:var(--accent);color:#fff;border-radius:999px;padding:18px 28px;font-size:22px;font-weight:900;box-shadow:0 14px 30px color-mix(in srgb,var(--accent) 35%,transparent)}.product-set{position:absolute;right:70px;bottom:55px;width:380px;height:470px}.box{position:absolute;width:220px;height:330px;right:20px;bottom:35px;border-radius:28px;background:linear-gradient(145deg,#fff,var(--soft));border:3px solid #fff;box-shadow:0 35px 60px #1f16382b;transform:rotate(5deg)}.box::before{content:"NOVA";position:absolute;left:30px;top:36px;font-size:24px;font-weight:950;letter-spacing:.14em}.box::after{content:"DAILY\A ESSENTIAL";white-space:pre;position:absolute;left:30px;bottom:40px;font-size:30px;line-height:1;font-weight:950}.bottle{position:absolute;width:126px;height:300px;left:30px;bottom:15px;border-radius:44px 44px 30px 30px;background:linear-gradient(145deg,var(--accent),color-mix(in srgb,var(--accent) 58%,#fff));border:3px solid #ffffffaa;box-shadow:0 30px 55px #21123c35;transform:rotate(-7deg)}.bottle::before{content:"";position:absolute;width:70px;height:45px;left:25px;top:-35px;border-radius:16px 16px 6px 6px;background:var(--ink)}.bottle::after{content:"N";position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:64px;font-weight:950}.social-card{width:520px;background:#fff;border-radius:30px;padding:30px;box-shadow:0 24px 60px #21123c1f;position:relative;z-index:2}.social-card+.social-card{margin-top:18px;margin-left:80px}.social-head{display:flex;align-items:center;gap:16px;font-size:21px;font-weight:900}.avatar{width:58px;height:58px;border-radius:50%;background:linear-gradient(145deg,var(--accent),var(--glow))}.stars{color:#ff9e00;letter-spacing:.12em;font-size:25px;margin:18px 0 12px}.quote{font-size:29px;font-weight:850;line-height:1.08}.verified{margin-top:18px;color:#23834c;font-size:18px;font-weight:850}.offer-number{font-size:150px;line-height:.82;font-weight:950;letter-spacing:-.08em;color:var(--accent);position:absolute;left:44px;top:44px}.offer-copy{position:absolute;left:50px;bottom:62px;width:410px;font-size:38px;font-weight:950;line-height:1.02}.pill{display:inline-flex;border-radius:999px;padding:12px 18px;background:var(--soft);font-size:19px;font-weight:900;margin:8px 8px 0 0}.compare{display:grid;grid-template-columns:1fr 1fr;gap:24px;height:100%}.compare-col{border-radius:32px;padding:30px;background:var(--soft);display:flex;flex-direction:column}.compare-col.good{background:var(--ink);color:#fff}.compare-col h3{font-size:32px;margin:0 0 22px}.compare-col ul{list-style:none;padding:0;margin:0}.compare-col li{font-size:22px;font-weight:780;padding:15px 0;border-bottom:1px solid #ffffff33}.compare-col li::before{content:"×";margin-right:12px;color:#ef476f}.compare-col.good li::before{content:"✓";color:#b8ff4a}.edu-number{font-size:220px;font-weight:950;line-height:.75;letter-spacing:-.08em;color:var(--accent);position:absolute;right:38px;bottom:44px}.edu-list{width:560px}.edu-list h3{font-size:42px;margin:0 0 22px}.edu-list div{display:flex;gap:18px;align-items:center;padding:18px 0;border-bottom:2px solid var(--soft);font-size:24px;font-weight:850}.edu-list b{width:42px;height:42px;display:grid;place-items:center;border-radius:50%;background:var(--ink);color:#fff}.feature-line{position:absolute;height:3px;background:var(--ink);transform-origin:left center}.feature-line::after{content:"";position:absolute;right:-8px;top:-7px;width:17px;height:17px;border-radius:50%;background:var(--accent)}.feature-label{position:absolute;background:var(--ink);color:#fff;border-radius:999px;padding:12px 18px;font-size:20px;font-weight:900}.portrait{position:absolute;right:55px;bottom:0;width:370px;height:520px;border-radius:190px 190px 30px 30px;background:linear-gradient(145deg,var(--soft),var(--glow));overflow:hidden}.portrait::before{content:"";position:absolute;width:145px;height:145px;border-radius:50%;background:var(--ink);left:112px;top:58px}.portrait::after{content:"";position:absolute;width:270px;height:310px;border-radius:150px 150px 30px 30px;background:var(--accent);left:50px;bottom:-20px}.authority-copy{width:500px}.authority-copy blockquote{font-size:42px;line-height:1.05;font-weight:900;margin:20px 0}.seal-row{display:flex;gap:18px;margin-top:28px}.seal{width:100px;height:100px;border-radius:50%;border:5px double var(--accent);display:grid;place-items:center;text-align:center;font-size:15px;font-weight:950;transform:rotate(-7deg)}.mini-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.mini{background:#fff;border-radius:22px;padding:20px;font-weight:800;box-shadow:0 14px 35px #21123c14}.mini .stars{font-size:18px;margin:0 0 8px}.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;height:100%}.step{border-radius:30px;background:var(--soft);padding:28px;display:flex;flex-direction:column;justify-content:space-between}.step b{font-size:80px;color:var(--accent)}.step span{font-size:24px;font-weight:900}.card[data-group="oferta"] .stage{background:linear-gradient(135deg,#fff,#ffffffb5)}.card[data-group="vs"] .stage{background:#ffffffd9}.card[data-group="educativo"] .stage{background:#fff}.card[data-group="demo"] .stage{background:linear-gradient(145deg,#fff,var(--soft))}.card[data-group="autoridad"] .stage{background:#fff}
	</style>
</head>
<body>
	<div id="mount"></div>
	<script type="module">
		import { starterReferences } from './reference-starter-50.mjs';
		const id = Number(new URLSearchParams(location.search).get('id') || 1);
		const item = starterReferences.find((entry) => entry.id === id) || starterReferences[0];
		function socialMarkup(){
			if(item.id===3) return `<div class="mini-grid">${Array.from({length:6},(_,i)=>`<div class="mini"><div class="stars">★★★★★</div>${['Llegó rapidísimo','Calidad increíble','Lo volvería a elegir','Superó mis expectativas','Es exactamente lo que quería','Se nota la diferencia'][i]}</div>`).join('')}</div>`;
			if([6,7,12].includes(item.id)) return `<div class="authority-copy"><span class="pill">HISTORIA REAL</span><blockquote>“Se siente hecho para mí.”</blockquote><div class="stars">★★★★★</div><strong>— Cliente verificado</strong></div><div class="portrait"></div>`;
			if(item.id===9) return `<div class="offer-number">12.483</div><div class="offer-copy">personas ya eligieron cambiar.</div><div class="product-set"><div class="box"></div><div class="bottle"></div></div>`;
			return `<div class="social-card"><div class="social-head"><div class="avatar"></div><div>@cliente.real<br><small>Compra verificada</small></div></div><div class="stars">★★★★★</div><div class="quote">${item.headline.replace(/[“”]/g,'')}</div><div class="verified">✓ Opinión verificada</div></div><div class="social-card"><div class="social-head"><div class="avatar"></div><div>La respuesta de la marca</div></div><div class="quote">Gracias por elegirnos. ✦</div></div>`;
		}
		function offerMarkup(){
			const number = ({13:'$59',14:'KIT',15:'04:12',16:'+1',17:'2×1',18:'$0',19:'30%',20:'3×',21:'30',22:'3×'})[item.id] || 'HOY';
			return `<div class="offer-number">${number}</div><div class="offer-copy">${item.badge}<br><span class="pill">Solo por tiempo limitado</span></div><div class="product-set"><div class="box"></div><div class="bottle"></div></div>`;
		}
		function compareMarkup(){return `<div class="compare"><div class="compare-col"><h3>La alternativa</h3><ul><li>Más pasos</li><li>Menos claridad</li><li>Resultado incierto</li><li>Costo oculto</li></ul></div><div class="compare-col good"><h3>Tu producto</h3><ul><li>Simple de elegir</li><li>Beneficio claro</li><li>Respaldo visible</li><li>Valor real</li></ul></div></div>`}
		function educationMarkup(){
			if(item.id===36 || item.id===45 || item.id===47) return `<div class="steps"><div class="step"><b>1</b><span>El problema aparece</span></div><div class="step"><b>2</b><span>Elegís una solución</span></div><div class="step"><b>3</b><span>Disfrutás el cambio</span></div></div>`;
			return `<div class="edu-list"><h3>${item.badge}</h3><div><b>1</b> Una idea por imagen</div><div><b>2</b> Prueba visible</div><div><b>3</b> Beneficio concreto</div><div><b>4</b> Acción clara</div></div><div class="edu-number">${item.id===31?'73%':String(item.id-29).padStart(2,'0')}</div>`;
		}
		function demoMarkup(){
			if([45,47].includes(item.id)) return educationMarkup();
			return `<div class="product-set" style="right:270px;transform:scale(1.18)"><div class="box"></div><div class="bottle"></div></div><div class="feature-line" style="left:120px;top:150px;width:260px;transform:rotate(8deg)"></div><div class="feature-label" style="left:40px;top:105px">Diseño real</div><div class="feature-line" style="left:590px;top:245px;width:230px;transform:rotate(-10deg)"></div><div class="feature-label" style="right:35px;top:188px">Beneficio clave</div><div class="feature-line" style="left:170px;bottom:115px;width:220px;transform:rotate(-7deg)"></div><div class="feature-label" style="left:35px;bottom:62px">Listo para usar</div>`;
		}
		function authorityMarkup(){return `<div class="authority-copy"><span class="pill">RESPALDO REAL</span><blockquote>${item.headline}</blockquote><div class="seal-row"><div class="seal">CALIDAD<br>VERIFICADA</div><div class="seal">ELECCIÓN<br>EXPERTA</div></div></div><div class="portrait"></div>`}
		const stage = item.group==='social'?socialMarkup():item.group==='oferta'?offerMarkup():item.group==='vs'?compareMarkup():item.group==='educativo'?educationMarkup():item.group==='demo'?demoMarkup():authorityMarkup();
		document.querySelector('#mount').innerHTML = `<article class="card" data-group="${item.group}" data-variant="${item.variant}"><div class="top"><div class="brand"><i class="mark"></i> NOVA LAB</div><div class="idea">IDEA ${String(item.id).padStart(2,'0')}</div></div><div class="copy"><span class="eyebrow">${item.name}</span><h1>${item.headline}</h1><p>${item.badge}. Una estructura estática lista para adaptar a cualquier negocio.</p></div><section class="stage">${stage}</section><footer class="proof"><div><strong>★★★★★ 4,9</strong><br><span>Más de 2.400 clientes</span></div><div class="cta">Quiero el mío →</div></footer></article>`;
		</script>
	</body>
</html>
